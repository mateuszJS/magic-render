name: Release Package to npmjs
on:
  push:
    branches:
      - main
      - next

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write # required for OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Setup .npmrc file to publish to npm
      - uses: mlugg/setup-zig@v2
        with:
          version: '0.14.1'
      - uses: actions/setup-node@v6
        with:
          node-version: '24.10.x' # [semantic-release@25]: requires Node ^22.14.0 || >=24.10.0
      - run: npm ci
      - run: npm run build
      - run: npm audit --omit=dev
      # once we install dependency we can change it to "npm audit signatures" to verify signatures as well
      # --omit-dev because of axios vulneraiblity used by wasm-pack, not in prod, vulnerability is active only when user input is provided
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
